<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src https://rentals-api.99redder.workers.dev; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'none'; form-action 'self'">
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0b1322">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Red's Stuff">
  <meta name="format-detection" content="telephone=no">
  <title>Red's Stuff Snapshot</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="32x32" href="../stuff-icon-32.png">
  <link rel="apple-touch-icon" sizes="192x192" href="../stuff-icon-192.png">
  <style>
    :root {
      color-scheme: dark;
      --ink:#f3f6fb; --muted:#9cabbe; --paper:#0b1322; --card:#17243a;
      --green:#176b5b; --green2:#43b9a1; --mint:#173e3a; --line:#30415b;
      --good:#53d3b1; --bad:#ff837b; --amber:#e9b85f; --shadow:0 12px 32px rgba(0,0,0,.28);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;min-height:100%;background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif}
    body{padding:0 0 calc(84px + env(safe-area-inset-bottom))}
    button,input{font:inherit}
    button{cursor:pointer}
    .hidden{display:none!important}
    .login{min-height:100dvh;padding:max(64px,env(safe-area-inset-top)) 24px 40px;display:grid;place-items:center;background:#080e19}
    .login-card{width:min(100%,390px);background:var(--card);border-radius:28px;padding:30px 24px;box-shadow:0 24px 70px rgba(0,0,0,.25)}
    .mark{width:54px;height:54px;border-radius:18px;display:grid;place-items:center;background:var(--mint);font-size:27px;margin-bottom:24px}
    h1{font-family:Georgia,serif;font-size:2.15rem;line-height:1;margin:0 0 9px;letter-spacing:-.04em}
    .login-card p{color:var(--muted);line-height:1.5;margin:0 0 25px}
    label{display:block;font-size:.76rem;text-transform:uppercase;letter-spacing:.08em;font-weight:800;color:var(--muted);margin-bottom:8px}
    input{width:100%;min-height:52px;border:1px solid var(--line);border-radius:14px;background:#101c2f;color:var(--ink);padding:0 15px;font-size:1rem;outline:none}
    input:focus{border-color:var(--green2);box-shadow:0 0 0 3px rgba(38,115,101,.14)}
    .primary{width:100%;min-height:52px;border:0;border-radius:14px;background:var(--green);color:white;font-weight:800;margin-top:13px}
    .login-error{min-height:20px;color:var(--bad);font-size:.86rem;font-weight:650;margin-top:12px}
    .shell{max-width:620px;margin:0 auto}
    .top{position:sticky;top:0;z-index:10;padding:max(15px,env(safe-area-inset-top)) 18px 12px;background:rgba(11,19,34,.92);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
    .top-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .top-actions{display:flex;align-items:center;gap:8px}
    .eyebrow{font-size:.69rem;color:var(--green2);font-weight:850;text-transform:uppercase;letter-spacing:.11em;margin-bottom:3px}
    .page-title{font-family:Georgia,serif;font-size:1.72rem;font-weight:700;letter-spacing:-.035em}
    .icon-btn{width:44px;height:44px;border:1px solid var(--line);border-radius:50%;background:var(--card);color:var(--green);font-size:19px;font-weight:800}
    .sync{font-size:.72rem;color:var(--muted);margin-top:4px}
    main{padding:7px 16px 28px}
    .hero{padding:21px;border-radius:24px;background:var(--green);color:white;box-shadow:var(--shadow);margin-bottom:13px;overflow:hidden;position:relative}
    .hero:after{content:"";position:absolute;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.06);right:-62px;top:-65px}
    .hero-label{font-size:.71rem;text-transform:uppercase;letter-spacing:.1em;font-weight:800;opacity:.7}
    .hero-value{font-family:Georgia,serif;font-size:2.45rem;line-height:1.05;margin:7px 0 4px;letter-spacing:-.04em;font-variant-numeric:tabular-nums}
    .hero-note{font-size:.79rem;opacity:.72}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:11px;margin-bottom:13px}
    .stat,.card{background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow)}
    .stat{border-radius:18px;padding:15px;min-width:0}
    .stat-label{font-size:.67rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-weight:800}
    .stat-value{font-size:1.22rem;font-weight:850;margin-top:6px;font-variant-numeric:tabular-nums;overflow-wrap:anywhere}
    .stat-sub{font-size:.7rem;color:var(--muted);margin-top:4px}
    .good{color:var(--good)}.bad{color:var(--bad)}.amber{color:var(--amber)}
    .card{border-radius:21px;margin-bottom:13px;overflow:hidden}
    .card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 17px 11px}
    .card-title{font-weight:850;font-size:.98rem}
    .pill{font-size:.65rem;font-weight:800;padding:5px 8px;border-radius:999px;background:var(--mint);color:var(--green2)}
    .rows{padding:0 17px 8px}
    .row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;padding:12px 0;border-top:1px solid var(--line);align-items:center}
    .row:first-child{border-top:0}
    .row-name{font-size:.88rem;font-weight:700;min-width:0;overflow-wrap:anywhere}
    .row-note{font-size:.7rem;color:var(--muted);font-weight:500;margin-top:3px}
    .row-value{text-align:right;font-weight:800;font-size:.89rem;white-space:nowrap;font-variant-numeric:tabular-nums}
    .budget-category{border-top:1px solid var(--line)}
    .budget-category:first-child{border-top:0}
    .budget-category summary{list-style:none;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;padding:13px 0;align-items:center;cursor:pointer}
    .budget-category summary::-webkit-details-marker{display:none}
    .budget-category summary .row-name:after{content:'  ▸';color:var(--muted);font-size:.72rem}
    .budget-category[open] summary .row-name:after{content:'  ▾'}
    .budget-breakdown{border-top:1px solid var(--line);padding:3px 0 7px 13px}
    .month-switch{display:grid;grid-template-columns:44px minmax(0,1fr) 44px;gap:8px;align-items:center;margin-bottom:13px}
    .month-switch button{height:42px;border:1px solid var(--line);border-radius:13px;background:var(--card);color:var(--ink);font-weight:850}
    .month-label{text-align:center;font-weight:850;color:var(--ink)}
    .nw-chart{width:100%;height:210px;display:block}
    .nw-category{border-top:1px solid var(--line)}
    .nw-category:first-child{border-top:0}
    .nw-category summary{list-style:none;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;padding:14px 0;align-items:center;cursor:pointer}
    .nw-category summary::-webkit-details-marker{display:none}
    .nw-category-title{font-size:.9rem;font-weight:850}
    .nw-category-title:after{content:'  ▸';color:var(--muted);font-size:.72rem}
    .nw-category[open] .nw-category-title:after{content:'  ▾'}
    .nw-category-items{border-top:1px solid var(--line);padding:4px 0 7px 13px}
    .empty{padding:30px 20px;text-align:center;color:var(--muted);font-size:.87rem}
    .property-strip{display:flex;gap:8px;overflow-x:auto;padding:1px 1px 12px;scrollbar-width:none}
    .property-strip::-webkit-scrollbar{display:none}
    .property-chip{flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--muted);padding:10px 15px;border-radius:999px;font-weight:800}
    .property-chip.active{background:var(--green);border-color:var(--green);color:white}
    .nav{position:fixed;z-index:20;left:0;right:0;bottom:0;background:rgba(15,25,43,.95);border-top:1px solid var(--line);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:7px 5px max(7px,env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(7,1fr)}
    .nav-btn{border:0;background:transparent;color:var(--muted);padding:5px 0 3px;font-size:.53rem;font-weight:750;min-width:0}
    .nav-icon{display:block;font-size:1.25rem;line-height:1.3;filter:grayscale(1);opacity:.7}
    .nav-btn.active{color:var(--green)}.nav-btn.active .nav-icon{filter:none;opacity:1}
    .loading{padding:80px 20px;text-align:center;color:var(--muted);font-weight:700}
    .spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--green2);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}@keyframes spin{to{transform:rotate(360deg)}}
    .banner{border-radius:15px;padding:12px 14px;margin-bottom:12px;background:#3a2d16;color:#f4cf83;font-size:.78rem;font-weight:650;line-height:1.4}
    @media (min-width:500px){main{padding-left:22px;padding-right:22px}.grid{grid-template-columns:repeat(3,1fr)}}
  </style>
</head>
<body>
  <section id="login" class="login">
    <form class="login-card" id="login-form">
      <div class="mark">⌂</div>
      <h1>Red's Stuff Snapshot</h1>
      <p>A private, read-only view of your properties and financial plans.</p>
      <label for="password">Rental Manager Password</label>
      <input id="password" type="password" autocomplete="current-password" required>
      <button class="primary" id="login-button" type="submit">Open dashboard</button>
      <div class="login-error" id="login-error" role="alert"></div>
    </form>
  </section>

  <div id="app" class="shell hidden">
    <header class="top">
      <div class="top-row">
        <div><div class="eyebrow">Read only</div><div class="page-title" id="page-title">Monthly Budget</div></div>
        <div class="top-actions"><button class="icon-btn" id="lock" aria-label="Lock and sign out" title="Lock">⌾</button><button class="icon-btn" id="refresh" aria-label="Refresh">↻</button></div>
      </div>
      <div class="sync" id="sync-status">Loading current data…</div>
    </header>
    <main id="content"></main>
    <nav class="nav" aria-label="Dashboard">
      <button class="nav-btn active" data-view="budget"><span class="nav-icon">◫</span>Budget</button>
      <button class="nav-btn" data-view="cashflow"><span class="nav-icon">↗</span>Cash Flow</button>
      <button class="nav-btn" data-view="tax"><span class="nav-icon">§</span>Tax</button>
      <button class="nav-btn" data-view="savings"><span class="nav-icon">◆</span>Savings</button>
      <button class="nav-btn" data-view="networth"><span class="nav-icon">◎</span>Net Worth</button>
      <button class="nav-btn" data-view="mom"><span class="nav-icon">♡</span>Mom</button>
      <button class="nav-btn" data-view="properties"><span class="nav-icon">⌂</span>Properties</button>
    </nav>
  </div>

  <script>
  'use strict';
  const API = 'https://rentals-api.99redder.workers.dev/api/data';
  const SESSION_TOKEN_KEY = 'rentals_session_token';
  const YEAR = 2026;
  const PROPERTIES = ['6AL','95EB','446BB','731WO','4781MC'];
  const RENTALS = new Set(['6AL','95EB','446BB']);
  const CASH_FLOW_AUTO_PROPS = ['6AL','95EB','731WO'];
  const EXPENSE_CATS = ['Weekly Spending','Retirement Savings','School Savings','Investments','Misc Savings','Utilities','Services','Mortgage','Cars','Insurance','Travel'];
  const TITLES = {budget:'Monthly Budget',cashflow:'2026 Cash Flow',tax:'Tax Planning',savings:'Savings',networth:'Net Worth',mom:'Mom Budget',properties:'Properties'};
  const CAT_NAMES = {rent:'Rent Received',deposit:'Security Deposit',late_fee:'Late Fees',other_income:'Other Income',taxes:'Property Taxes',insurance:'Insurance',repairs:'Repairs & Maintenance',improvements:'Improvements',utilities:'Utilities',hoa:'HOA Fees',management:'Property Management',auto:'Auto',legal:'Legal & Professional',marketing:'Advertising',other_expense:'Other Expenses'};
  const state = {view:'budget',property:'6AL',momMonth:'',data:{},loading:false,robinhoodLoading:false,lastSync:null};
  const $ = s => document.querySelector(s);
  const n = v => Number.isFinite(Number(v)) ? Number(v) : 0;
  const money = v => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n(v));
  const fullMoney = v => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:2}).format(n(v));
  const esc = v => String(v ?? '').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
  const tone = v => n(v) < 0 ? 'bad' : 'good';
  const sum = (items, fn=x=>n(x.amount)) => (items||[]).reduce((t,x)=>t+fn(x),0);

  async function api(body) {
    const token=localStorage.getItem(SESSION_TOKEN_KEY)||'';
    const headers={'Content-Type':'application/json'};if(token)headers['X-Session']=token;
    const res = await fetch(API,{method:'POST',credentials:'include',headers,body:JSON.stringify(body)});
    const data = await res.json().catch(()=>({}));
    if (res.status===401) { showLogin(); throw new Error('Your session expired. Please sign in again.'); }
    if (!res.ok) throw new Error(data.error || 'Unable to load data');
    return data;
  }

  async function signIn(password) {
    const res = await fetch(API,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'verify_password',password,rememberDevice:true})});
    const data = await res.json().catch(()=>({}));
    if (!res.ok || !data.ok) throw new Error(data.error || 'Incorrect password');
    if(data.sessionToken)localStorage.setItem(SESSION_TOKEN_KEY,data.sessionToken);
  }

  function showLogin(){ localStorage.removeItem(SESSION_TOKEN_KEY); $('#app').classList.add('hidden'); $('#login').classList.remove('hidden'); }
  function showApp(){ $('#login').classList.add('hidden'); $('#app').classList.remove('hidden'); }
  async function lockApp(){
    const token=localStorage.getItem(SESSION_TOKEN_KEY)||'',headers={'Content-Type':'application/json'};if(token)headers['X-Session']=token;
    try{await fetch(API,{method:'POST',credentials:'include',headers,body:JSON.stringify({action:'logout'})})}catch{}
    state.data={};state.lastSync=null;showLogin();$('#password').focus();
  }
  function loading(){ $('#content').innerHTML='<div class="loading"><div class="spinner"></div>Loading current data…</div>'; }
  function errorCard(err){ $('#content').innerHTML=`<div class="banner">${esc(err.message||err)}</div><div class="empty">Pull down or tap refresh to try again.</div>`; }
  function stat(label,value,sub='',cls=''){return `<div class="stat"><div class="stat-label">${esc(label)}</div><div class="stat-value ${cls}">${esc(value)}</div>${sub?`<div class="stat-sub">${esc(sub)}</div>`:''}</div>`}
  function row(name,value,note='',cls=''){return `<div class="row"><div><div class="row-name">${esc(name)}</div>${note?`<div class="row-note">${esc(note)}</div>`:''}</div><div class="row-value ${cls}">${esc(value)}</div></div>`}
  function card(title,rows,badge=''){return `<section class="card"><div class="card-head"><div class="card-title">${esc(title)}</div>${badge?`<span class="pill">${esc(badge)}</span>`:''}</div><div class="rows">${rows||'<div class="empty">No data recorded.</div>'}</div></section>`}

  async function loadView(force=false){
    if(state.loading)return; state.loading=true; loading();
    let pullRobinhood=false;
    try{
      if(state.view==='budget' && (force||!state.data.budget)) state.data.budget=(await api({action:'get_budget'})).data||{};
      if(state.view==='tax' && (force||!state.data.tax)) state.data.tax=(await api({action:'get_tax_planning',year:String(YEAR)})).data||{};
      if(state.view==='savings' && (force||!state.data.savings)) state.data.savings=(await api({action:'get_savings'})).data||{};
      // Cached read only snapshot only. Never call refresh_net_worth_plaid from the PWA.
      if(state.view==='networth' && (force||!state.data.netWorth)) state.data.netWorth=(await api({action:'get_net_worth'})).data||{};
      if(state.view==='cashflow' && (force||!state.data.cashflow||!state.data.savings||!state.data.netWorth)){
        const [cashflow,savings,netWorth]=await Promise.all([api({action:'get_cash_flow',year:String(YEAR)}),api({action:'get_savings'}),api({action:'get_net_worth'})]);
        state.data.cashflow=cashflow.data||{};state.data.savings=savings.data||{};state.data.netWorth=netWorth.data||{};
      }
      if(state.view==='savings' && (force||!state.data.robinhood)){state.robinhoodLoading=true;pullRobinhood=true;}
      if(state.view==='mom' && (force||!state.data.mom)) state.data.mom=(await api({action:'get_mom_budget'})).data||{};
      if((state.view==='cashflow'||state.view==='properties'||state.view==='tax') && (force||!state.data.transactions)){
        const results=await Promise.all(PROPERTIES.map(property=>api({action:'get_transactions',property})));
        state.data.transactions=Object.fromEntries(PROPERTIES.map((p,i)=>[p,results[i].transactions||[]]));
      }
      state.lastSync=new Date(); render();
      if(pullRobinhood)void refreshRobinhoodInBackground(force);
    }catch(err){errorCard(err)}finally{state.loading=false;updateSync()}
  }

  async function refreshRobinhoodInBackground(force){
    try{state.data.robinhood=await api({action:'get_robinhood_balance',refresh:force});state.lastSync=new Date();}
    catch{/* keep the last Savings-synchronized Plaid value */}
    finally{state.robinhoodLoading=false;if(state.view==='savings'||state.view==='cashflow'){render();updateSync();}}
  }

  function updateSync(){ $('#sync-status').textContent=state.lastSync?`Updated ${state.lastSync.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}`:'Not yet updated'; }
  function yearTxns(prop){return (state.data.transactions?.[prop]||[]).filter(t=>String(t.date||'').startsWith(String(YEAR)));}
  function txnTotals(items){const income=sum(items.filter(t=>t.type==='income'));const expenses=sum(items.filter(t=>t.type==='expense'));return{income,expenses,net:income-expenses};}

  function renderBudget(){
    const b=state.data.budget||{}; const income=b.income||[]; const expenses=b.expenses||{};
    const totalIncome=sum(income); const catTotals=EXPENSE_CATS.map(name=>({name,amount:sum(expenses[name]||[])})); const totalExpenses=sum(catTotals);
    const net=totalIncome-totalExpenses;
    const categoryRows=catTotals.filter(x=>x.amount).sort((a,b)=>b.amount-a.amount).map(x=>{
      const items=(expenses[x.name]||[]).slice().sort((a,b)=>n(b.amount)-n(a.amount));
      return `<details class="budget-category"><summary><span class="row-name">${esc(x.name)}</span><span class="row-value">${esc(money(x.amount))}</span></summary><div class="budget-breakdown">${items.map(item=>row(item.name||'Untitled',money(item.amount),item.note||'')).join('')}</div></details>`;
    }).join('');
    return `<div class="hero"><div class="hero-label">Monthly amount left</div><div class="hero-value">${money(net)}</div><div class="hero-note">Income after planned expenses and savings</div></div>
      <div class="grid">${stat('Income',money(totalIncome),'per month','good')}${stat('Planned',money(totalExpenses),'per month','bad')}${stat('Margin',money(net),'per month',tone(net))}</div>
      ${card('Income',income.sort((a,b)=>n(b.amount)-n(a.amount)).map(i=>row(i.name,money(i.amount),i.property?`${i.property} worksheet`:'' )).join(''),'Monthly')}
      ${card('Expense categories',categoryRows,'Tap to expand')}`;
  }

  function renderCashFlow(){
    const cf=state.data.cashflow||{};
    const checking=n(state.data.savings?.accounts?.robinhoodChecking);
    const properties=state.data.netWorth?.propertyAssets||[];
    const autoIncome=CASH_FLOW_AUTO_PROPS.map(prop=>{
      const asset=properties.find(item=>item.id===`property-${prop}`)||{};
      return {name:`${prop} Sale Net Proceeds After Taxes${n(asset.mortgagePayoff)?' & Mortgage Payoff':''}`,amount:n(asset.value),date:'',note:`Auto from ${prop} sale worksheet`};
    });
    const manualIncome=Array.isArray(cf.income)?cf.income:[];
    const expenses=Array.isArray(cf.expenses)?cf.expenses:[];
    const totalIncome=checking+sum(autoIncome)+sum(manualIncome);
    const totalExpenses=sum(expenses);
    const excess=totalIncome-totalExpenses;
    const dateNote=item=>[item.date||'Unscheduled',item.note||''].filter(Boolean).join(' · ');
    const incomeRows=row('Robinhood Joint Checking Current Balance',money(checking),'Pinned · Plaid','good')
      +autoIncome.map(item=>row(item.name,money(item.amount),`${item.note} · Auto`,item.amount?'good':'')).join('')
      +manualIncome.slice().sort((a,b)=>String(a.date||'9999').localeCompare(String(b.date||'9999'))).map(item=>row(item.name||'Untitled',money(item.amount),`${dateNote(item)} · Manual`,'good')).join('');
    const expenseRows=expenses.slice().sort((a,b)=>n(b.amount)-n(a.amount)).map(item=>row(item.name||'Untitled',money(item.amount),dateNote(item),'bad')).join('');
    return `<div class="hero"><div class="hero-label">${excess>=0?'Excess left over':'Shortfall'}</div><div class="hero-value">${excess<0?'−':''}${money(Math.abs(excess))}</div><div class="hero-note">${money(totalIncome)} income minus ${money(totalExpenses)} expenses</div></div>
      <div class="grid">${stat('Income events',money(totalIncome),`1 pinned · ${autoIncome.length} auto · ${manualIncome.length} manual`,'good')}${stat('Expense events',money(totalExpenses),`${expenses.length} items`,'bad')}${stat(excess>=0?'Excess':'Shortfall',money(Math.abs(excess)),'expected amount',tone(excess))}</div>
      ${card('Income',incomeRows,'2026')}
      ${card('Expenses',expenseRows,'Amount order')}`;
  }

  const FED_BRACKETS=[[24800,.10],[100800,.12],[211400,.22],[403550,.24],[512450,.32],[768700,.35],[Infinity,.37]];
  const LTCG_BRACKETS=[[98900,0],[613700,.15],[Infinity,.20]];
  const MD_BRACKETS=[[1000,.02],[2000,.03],[3000,.04],[150000,.0475],[175000,.05],[225000,.0525],[300000,.055],[600000,.0575],[1200000,.0625],[Infinity,.065]];
  const MD_COUNTY={Wicomico:.032,Worcester:.0225,'Anne Arundel':.0294,'Baltimore City':.032,'Baltimore County':.032,Calvert:.032,Caroline:.032,Carroll:.0303,Cecil:.0274,Charles:.0303,Dorchester:.033,Frederick:.0296,Garrett:.0265,Harford:.0306,Howard:.032,Kent:.033,Montgomery:.032,"Prince George's":.032,"Queen Anne's":.032,"St. Mary's":.032,Somerset:.032,Talbot:.024,Washington:.0295,Allegany:.032};
  function bracketTax(income,brackets){let tax=0,prev=0;for(const [limit,rate] of brackets){if(income<=prev)break;tax+=(Math.min(income,limit)-prev)*rate;prev=limit}return tax}
  function capitalTax(stack,gain){let tax=0,base=stack,remaining=gain;for(const [limit,rate] of LTCG_BRACKETS){if(remaining<=0)break;if(base>=limit)continue;const chunk=Math.min(remaining,limit-base);tax+=chunk*rate;remaining-=chunk;base=limit}return tax}
  function mobileTaxCalc(tp,rentalRows){
    const wages=n(tp.navy_gross)+n(tp.wife_gross),business=n(tp.fmg_sp)+n(tp.fmg)+n(tp.esai),rentalNet=sum(rentalRows,x=>x.net),rentalDepr=n(tp.rental_depr),rentalTaxInc=rentalNet-rentalDepr;
    const interest=n(tp.treasury_int)+n(tp.ally_int)+n(tp.rh_int)+n(tp.ibkr_int),dividends=n(tp.rh_div)+n(tp.ibkr_div),cryptoIncome=n(tp.crypto_income);
    const propertyGain=n(tp.property_sale_taxable_gain)+n(tp.property_sale_2_taxable_gain),recapture=n(tp.property_sale_depr_recapture)+n(tp.property_sale_2_depr_recapture);
    const shortGains=n(tp.crypto_st)+n(tp.rh_st)+n(tp.ibkr_st),longGains=n(tp.crypto_lt)+n(tp.rh_lt)+n(tp.ibkr_lt)+propertyGain;
    const netSe=Math.max(0,business)*.9235,seTax=Math.min(netSe,184500)*.124+netSe*.029,halfSe=seTax/2;
    const gross=wages+business+rentalTaxInc+interest+dividends+cryptoIncome+shortGains+longGains+recapture,ira=Math.min(n(tp.ira),15000),agi=Math.max(0,gross-ira-halfSe);
    const std=n(tp.std_ded)||32200,qbi=tp.use_qbi===false?0:Math.max(0,business-halfSe)*.2,taxable=Math.max(0,agi-std-qbi);
    const ltcgTaxable=Math.min(Math.max(0,longGains),taxable),recaptureTaxable=Math.min(Math.max(0,recapture),Math.max(0,taxable-ltcgTaxable)),ordinaryTaxable=Math.max(0,taxable-ltcgTaxable-recaptureTaxable);
    const ordinaryTax=bracketTax(ordinaryTaxable,FED_BRACKETS),ltcgTax=capitalTax(ordinaryTaxable+recaptureTaxable,ltcgTaxable),recaptureTax=recaptureTaxable*.25;
    const investmentIncome=interest+dividends+longGains+shortGains+cryptoIncome+recapture+Math.max(0,rentalTaxInc),niit=agi>250000?Math.min(investmentIncome,agi-250000)*.038:0;
    const grossFederal=ordinaryTax+ltcgTax+recaptureTax+seTax+niit,ctc=Math.max(0,4400-Math.max(0,Math.ceil((agi-400000)/1000))*50),federalTax=Math.max(0,grossFederal-ctc);
    const federalWithheld=n(tp.navy_fed)+n(tp.wife_fed),estimated=sum(tp.estimated_payments||[]),federalPaid=federalWithheld+estimated,federalOwed=federalTax-federalPaid;
    const navyExempt=Math.min(n(tp.navy_gross),tp.navy_age_55?20000:12500),md529=n(tp.md_529),mdAgi=Math.max(0,agi-navyExempt-md529),mdPerExempt=agi<=150000?3200:agi<=175000?1600:agi<=200000?800:0,mdExempt=mdPerExempt*4,mdTaxable=Math.max(0,mdAgi-6700-mdExempt);
    const mdState=bracketTax(mdTaxable,MD_BRACKETS),county=tp.md_county||'Wicomico',countyTax=mdTaxable*(MD_COUNTY[county]||0);
    const st=n(tp.crypto_st)+n(tp.rh_st)+n(tp.ibkr_st);let mdLt=n(tp.crypto_lt)+n(tp.rh_lt)+n(tp.ibkr_lt);
    for(const prefix of ['property_sale','property_sale_2'])if(tp[`${prefix}_imported`]){const primary=['731WO','4781MC'].includes(tp[`${prefix}_property`])&&n(tp[`${prefix}_price`])<1500000;if(!primary)mdLt+=n(tp[`${prefix}_taxable_gain`])+n(tp[`${prefix}_depr_recapture`])}
    const surchargeBase=agi>350000?Math.max(0,mdLt+Math.min(0,st)):0,surcharge=surchargeBase*.02,mdTax=mdState+countyTax+surcharge,mdWithheld=n(tp.navy_state)+n(tp.wife_state),mdOwed=mdTax-mdWithheld;
    return {wages,business,rentalNet,rentalDepr,rentalTaxInc,interest,dividends,cryptoIncome,shortGains,longGains,recapture,gross,ira,halfSe,agi,std,qbi,taxable,ordinaryTax,ltcgTax,recaptureTax,seTax,niit,ctc,federalTax,federalWithheld,estimated,federalPaid,federalOwed,navyExempt,md529,mdAgi,mdExempt,mdTaxable,mdState,county,countyTax,surcharge,mdTax,mdWithheld,mdOwed};
  }
  function renderTax(){
    const tp=state.data.tax||{},rental=[...RENTALS].map(prop=>({prop,...txnTotals(yearTxns(prop))})),t=mobileTaxCalc(tp,rental),combined=t.federalOwed+t.mdOwed;
    const federalBreakdown=[['Wages',t.wages],['Business income',t.business],['Rental net before depreciation',t.rentalNet],['Rental depreciation',-t.rentalDepr],['Interest and dividends',t.interest+t.dividends],['Crypto ordinary income',t.cryptoIncome],['Short-term gains/losses',t.shortGains],['Long-term gains/losses',t.longGains],['Depreciation recapture',t.recapture],['Gross income',t.gross],['IRA deduction',-t.ira],['Half SE-tax deduction',-t.halfSe],['Federal AGI',t.agi],['Standard deduction',-t.std],['QBI deduction',-t.qbi],['Taxable income',t.taxable],['Ordinary income tax',t.ordinaryTax],['Long-term gains tax',t.ltcgTax],['Recapture tax',t.recaptureTax],['Self-employment tax',t.seTax],['Net investment income tax',t.niit],['Child Tax Credit',-t.ctc],['Total federal tax',t.federalTax],['Federal withholding',-t.federalWithheld],['Estimated payments',-t.estimated]];
    const mdBreakdown=[['Federal AGI',t.agi],['Military retirement exclusion',-t.navyExempt],['Maryland 529 deduction',-t.md529],['Maryland AGI',t.mdAgi],['Maryland standard deduction',-6700],['Personal exemptions',-t.mdExempt],['Maryland taxable income',t.mdTaxable],['Maryland state tax',t.mdState],[`${t.county} local tax`,t.countyTax],['Capital-gains surcharge',t.surcharge],['Total Maryland tax',t.mdTax],['Maryland withholding',-t.mdWithheld]];
    const calcRows=items=>items.map(([label,value])=>row(label,`${value<0?'−':''}${money(Math.abs(value))}`)).join('');
    return `<div class="hero"><div class="hero-label">${combined>0?'Estimated total still owed':'Estimated combined refund'}</div><div class="hero-value">${money(Math.abs(combined))}</div><div class="hero-note">Federal and Maryland estimates based on the saved 2026 tax plan</div></div>
      <div class="grid">${stat(t.federalOwed>0?'Federal owed':'Federal refund',money(Math.abs(t.federalOwed)),`${money(t.federalTax)} tax · ${money(t.federalPaid)} paid`,t.federalOwed>0?'bad':'good')}${stat(t.mdOwed>0?'Maryland owed':'Maryland refund',money(Math.abs(t.mdOwed)),`${money(t.mdTax)} tax · ${money(t.mdWithheld)} withheld`,t.mdOwed>0?'bad':'good')}</div>
      ${card('Federal calculation',calcRows(federalBreakdown),'2026 estimate')}
      ${card('Maryland calculation',calcRows(mdBreakdown),t.county)}`;
  }

  function renderSavings(){
    const s=state.data.savings||{}; const accounts=s.accounts||{}; const obligations=s.obligations||[]; const paidMap=s.payments?.[String(YEAR)]||{};
    const liveChecking=state.data.robinhood&&Number.isFinite(Number(state.data.robinhood.balance))?n(state.data.robinhood.balance):n(accounts.robinhoodChecking);
    const liquid=liveChecking+n(accounts.robinhoodBrokerage??accounts.ibkr); let annual=0,paid=0,outstanding=0;
    const progress=obligations.map(o=>{const ppy=o.kind==='static'?1:(o.paymentsPerYear===2?2:1);const slots=(paidMap[o.id]||[]).slice(0,ppy);while(slots.length<ppy)slots.push(false);const count=slots.filter(Boolean).length;const left=n(o.amount)/ppy*(ppy-count);annual+=n(o.amount);paid+=n(o.amount)-left;outstanding+=left;return{o,left,count,ppy};});
    const delta=liquid-annual;
    return `<div class="hero"><div class="hero-label">Funding ${delta>=0?'surplus':'shortfall'}</div><div class="hero-value">${delta>=0?'+':'−'}${money(Math.abs(delta))}</div><div class="hero-note">Available accounts versus total 2026 obligations</div></div>
      <div class="grid">${stat('Available',money(liquid),'liquid accounts','good')}${stat('Outstanding',money(outstanding),`${money(paid)} cleared`,'bad')}${stat('Annual total',money(annual),`${obligations.length} obligations`)}</div>
      ${card('Account balances',row('Robinhood Checking',money(liveChecking),state.robinhoodLoading?'◌ Pulling checking data…':state.data.robinhood?`${state.data.robinhood.stale?'Cached':'Live'} · ${new Date(state.data.robinhood.refreshedAt).toLocaleString()}`:'Last synchronized Plaid balance')+Object.entries(accounts).filter(([k])=>!['robinhoodChecking','robinhood'].includes(k)).map(([k,v])=>row(k.replace(/([A-Z])/g,' $1').replace(/^./,c=>c.toUpperCase()),money(v))).join(''))}
      ${card('Obligations',progress.sort((a,b)=>b.left-a.left).map(({o,left,count,ppy})=>row(o.name,left?money(left):'✓',`${o.kind==='static'?(count?'Funded':'Unfunded'):`${count} of ${ppy} paid`} · ${money(o.amount)} total`,left?'bad':'good')).join(''),'2026')}`;
  }

  function nwPercentile(value,anchors){const amount=Math.max(0,n(value));if(amount<=anchors[0][0])return anchors[0][1];for(let i=1;i<anchors.length;i++){const [hi,hp]=anchors[i],[lo,lp]=anchors[i-1];if(amount<=hi){const ratio=(Math.log1p(amount)-Math.log1p(lo))/(Math.log1p(hi)-Math.log1p(lo));return lp+(hp-lp)*ratio}}return 99}
  function nwType(item,origin){
    if(origin==='property')return'Real Estate';if(origin==='vehicle')return'Vehicles';if(origin==='treasury')return'Bonds & Fixed Income';
    const text=`${item.category||''} ${item.type||''} ${item.subtype||''} ${item.name||''}`.toLowerCase();
    if(/crypto|bitcoin|ethereum|digital asset/.test(text))return'Crypto';if(/brokerage|stock|equity|investment|401k|403b|ira|retirement|mutual fund|securities/.test(text))return'Stocks & Investments';if(/real estate|property|home|house|land/.test(text))return'Real Estate';if(/vehicle|car|auto|truck|suv/.test(text))return'Vehicles';if(/checking|savings|cash|money market|certificate|\bcd\b/.test(text))return'Cash & Banking';return item.category||'Other Assets';
  }
  function nwLiabilityType(item){const text=`${item.category||''} ${item.type||''} ${item.subtype||''} ${item.name||''}`.toLowerCase();if(/mortgage/.test(text))return'Mortgages';if(/credit/.test(text))return'Credit Cards';if(/auto|vehicle|car/.test(text))return'Auto Loans';if(/student/.test(text))return'Student Loans';if(/tax/.test(text))return'Taxes Owed';return item.category||'Other Liabilities'}
  function nwGroups(rows){
    const groups=new Map();for(const item of rows){if(!groups.has(item.category))groups.set(item.category,[]);groups.get(item.category).push(item)}
    return [...groups.entries()].sort(([a],[b])=>a.localeCompare(b)).map(([category,items])=>{items.sort((a,b)=>n(b.value)-n(a.value));const total=sum(items,x=>x.value);return `<details class="nw-category"><summary><span class="nw-category-title">${esc(category)}</span><span class="row-value">${money(total)}</span></summary><div class="nw-category-items">${items.map(item=>row(item.name,money(item.value),item.note||'')).join('')}</div></details>`}).join('');
  }
  function nwShort(value){const abs=Math.abs(n(value)),sign=value<0?'−':'';if(abs>=1e6)return`${sign}$${(abs/1e6).toFixed(abs>=1e7?1:2)}M`;if(abs>=1e3)return`${sign}$${(abs/1e3).toFixed(abs>=1e5?0:1)}k`;return`${sign}${money(abs)}`}
  function nwChart(history){
    const rows=(history||[]).slice(-24);if(rows.length<2)return'<div class="empty">The trajectory will appear after another dated snapshot.</div>';
    const values=rows.map(item=>n(item.netWorth)),min=Math.min(...values),max=Math.max(...values),range=max-min||1,points=values.map((value,i)=>`${30+i*(740/(values.length-1))},${25+(max-value)*(155/range)}`).join(' ');
    return `<svg class="nw-chart" viewBox="0 0 800 215" role="img" aria-label="Net worth history line chart"><line x1="30" y1="180" x2="770" y2="180" stroke="var(--line)"/><polyline points="${points}" fill="none" stroke="var(--green2)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><text x="34" y="20" fill="var(--muted)" font-size="12">${esc(nwShort(max))}</text><text x="34" y="174" fill="var(--muted)" font-size="12">${esc(nwShort(min))}</text><text x="30" y="207" fill="var(--muted)" font-size="11">${esc(rows[0].date||'')}</text><text x="770" y="207" text-anchor="end" fill="var(--muted)" font-size="11">${esc(rows.at(-1).date||'')}</text></svg>`;
  }
  function renderNetWorth(){
    const data=state.data.netWorth||{},properties=data.propertyAssets||[],plaid=data.plaidAccounts||[],vehicles=data.vehicles||[],manual=data.manualItems||[],treasury=data.treasuryPortfolio;
    const assets=[...(treasury?[{name:treasury.name||'U.S. Treasury Bonds',value:n(treasury.value),category:nwType(treasury,'treasury'),note:`${money(treasury.par)} par · ${money(treasury.annualInterest)} annual interest`}]:[]),...properties.map(item=>({name:item.name,value:n(item.value),category:nwType(item,'property'),note:`Net sale proceeds · ${item.source||'property worksheet'}`})),...plaid.filter(item=>item.side!=='liability').map(item=>({name:item.name,value:n(item.value),category:nwType(item,'plaid'),note:[item.institution,item.subtype,item.mask?`•••• ${item.mask}`:''].filter(Boolean).join(' · ')})),...vehicles.map(item=>({name:item.name,value:n(item.value),category:nwType(item,'vehicle'),note:`${item.year||''} ${item.make||''} ${item.model||''} ${item.trim||''}`.trim()})),...manual.filter(item=>item.side!=='liability').map(item=>({name:item.name,value:n(item.value),category:nwType(item,'manual'),note:item.notes||'Manual asset'}))];
    const liabilities=[...plaid.filter(item=>item.side==='liability').map(item=>({name:item.name,value:n(item.value),category:nwLiabilityType(item),subtype:item.subtype,note:[item.institution,item.mask?`•••• ${item.mask}`:'',item.subtype==='mortgage'?'Already deducted from 731WO net proceeds':''].filter(Boolean).join(' · ')})),...manual.filter(item=>item.side==='liability').map(item=>({name:item.name,value:n(item.value),category:nwLiabilityType(item),note:item.notes||'Manual liability'}))];
    const assetTotal=sum(assets,x=>x.value),mortgageIncluded=properties.some(item=>n(item.mortgagePayoff)>0),liabilityTotal=sum(liabilities,x=>mortgageIncluded&&x.subtype==='mortgage'?0:x.value),netWorth=assetTotal-liabilityTotal,us=nwPercentile(netWorth,[[0,5],[27100,25],[192900,50],[658900,75],[1938000,90],[3794600,95],[10000000,99]]),global=nwPercentile(netWorth,[[0,5],[10000,41.1],[100000,83.2],[1000000,98.5],[5000000,99.8]]);
    return `<div class="hero"><div class="hero-label">Current net worth</div><div class="hero-value">${netWorth<0?'−':''}${money(Math.abs(netWorth))}</div><div class="hero-note">Cached site snapshot · ${data.plaidRefreshedAt?`accounts updated ${new Date(data.plaidRefreshedAt).toLocaleString()}`:'no refresh date'}</div></div>
      <div class="grid">${stat('Assets',money(assetTotal),'cached total','good')}${stat('Liabilities',money(liabilityTotal),mortgageIncluded?'731WO mortgage already netted':'cached total','bad')}${stat('Compared with U.S.',`Higher than ~${us.toFixed(0)}%`,'2022 SCF estimate')}${stat('Compared globally',`Higher than ~${global.toFixed(0)}%`,'wealth-band estimate')}</div>
      ${card('Net Worth Trajectory',nwChart(data.history),'Cached')}
      ${card('Assets by category',nwGroups(assets),'Tap to expand')}
      ${card('Liabilities by category',nwGroups(liabilities),'Tap to expand')}
      <div class="banner">Read-only cached values from the desktop site. This PWA does not request Plaid refreshes or live valuations.</div>`;
  }

  function momExpected(item,key){const month=Number(key.slice(5,7)),frequency=item.frequency||'monthly';if(frequency==='monthly')return n(item.amount);if(frequency==='yearly')return month===n(item.dueMonth)?n(item.paymentAmount):0;if(frequency==='semiannual')return month===n(item.dueMonth)||month===((n(item.dueMonth)+5)%12)+1?n(item.paymentAmount):0;return 0}
  function momMonth(raw,key){
    const t=raw.template||{},m=raw.months?.[key]||{},fixed=t.fixed||[],discretionary=n(t.variable?.discretionary),spent=sum(m.discretionary||[]),other=sum(m.otherExpenses||[]);
    let fixedDue=0,fixedPaid=0,fixedOver=0;for(const item of fixed){const expected=momExpected(item,key);fixedDue+=expected;if(!m.fixedPaid?.[item.id])continue;const actual=n(m.fixedActual?.[item.id])||expected||n(item.amount);fixedPaid+=actual;if(['electric','water','gas-heat'].includes(item.id))fixedOver+=Math.max(0,actual-(expected||n(item.amount)))}
    const overages=other+fixedOver;return{income:sum(t.income||[]),fixedDue,fixedPaid,discretionary,spent,other,fixedOver,overages,left:discretionary-spent-overages};
  }
  function renderMom(){
    const raw=state.data.mom||{},now=new Date(),current=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`,keys=[...new Set([...Object.keys(raw.months||{}),current])].sort();
    if(!state.momMonth||!keys.includes(state.momMonth))state.momMonth=keys.includes(current)?current:keys.at(-1);const key=state.momMonth,index=keys.indexOf(key),x=momMonth(raw,key),date=new Date(`${key}-01T12:00:00`),label=new Intl.DateTimeFormat('en-US',{month:'long',year:'numeric'}).format(date),month=raw.months?.[key]||{},fixed=raw.template?.fixed||[];
    const fixedRows=fixed.map(item=>{const expected=momExpected(item,key),paid=!!month.fixedPaid?.[item.id],actual=paid?(n(month.fixedActual?.[item.id])||expected||n(item.amount)):0;return row(item.name,paid?fullMoney(actual):(expected?fullMoney(expected):'—'),paid?'Paid':expected?'Due / budgeted':'Not due',paid?'good':'')}).join('');
    const discretionaryRows=(month.discretionary||[]).slice().sort((a,b)=>String(a.date).localeCompare(String(b.date))).map(item=>row(item.name||'Discretionary',fullMoney(item.amount),item.date||'')).join('');
    const otherRows=(month.otherExpenses||[]).slice().sort((a,b)=>String(a.date).localeCompare(String(b.date))).map(item=>row(item.name||'Other expense',fullMoney(item.amount),`${item.date||''} · Overage`,'bad')).join('');
    return `<div class="month-switch"><button data-mom-month="${esc(keys[index-1]||'')}" ${index===0?'disabled':''} aria-label="Previous month">‹</button><div class="month-label">${esc(label)}</div><button data-mom-month="${esc(keys[index+1]||'')}" ${index===keys.length-1?'disabled':''} aria-label="Next month">›</button></div>
      <div class="hero"><div class="hero-label">Left to spend this month</div><div class="hero-value">${money(x.left)}</div><div class="hero-note">${money(x.discretionary)} budget minus ${money(x.spent)} spending and ${money(x.overages)} overages</div></div>
      <div class="grid">${stat('Spending budget',money(x.discretionary),'this month')}${stat('Spent',money(x.spent),`${(month.discretionary||[]).length} purchases`,'bad')}${stat('Overages',money(x.overages),'fixed and other',x.overages?'bad':'good')}</div>
      ${card('Fixed monthly spending',fixedRows,label)}
      ${card('Discretionary spending',discretionaryRows,label)}
      ${otherRows?card('Other expense overages',otherRows,label):''}`;
  }

  function renderProperties(){
    const chips=PROPERTIES.map(p=>`<button class="property-chip ${p===state.property?'active':''}" data-property="${p}">${p==='4781MC'?'4781 MC':p}</button>`).join('');
    const items=yearTxns(state.property);const totals=txnTotals(items);const cats={};for(const t of items){const sign=t.type==='income'?1:-1;cats[t.category]=(cats[t.category]||0)+sign*n(t.amount)}
    const recent=items.slice().sort((a,b)=>String(b.date).localeCompare(String(a.date))).slice(0,15);
    return `<div class="property-strip">${chips}</div><div class="hero"><div class="hero-label">${esc(state.property)} · 2026 net</div><div class="hero-value">${money(totals.net)}</div><div class="hero-note">${money(totals.income)} income · ${money(totals.expenses)} expenses</div></div>
      <div class="grid">${stat('Income',money(totals.income),'2026 YTD','good')}${stat('Expenses',money(totals.expenses),'2026 YTD','bad')}${stat('Entries',String(items.length),'transactions')}</div>
      ${card('Category totals',Object.entries(cats).sort((a,b)=>Math.abs(b[1])-Math.abs(a[1])).map(([k,v])=>row(CAT_NAMES[k]||k,money(v),'',tone(v))).join(''),'2026')}
      ${card('Recent transactions',recent.map(t=>row(t.description||CAT_NAMES[t.category]||t.category,`${t.type==='expense'?'−':'+'}${fullMoney(t.amount)}`,t.date,t.type==='expense'?'bad':'good')).join(''))}`;
  }

  function render(){
    $('#page-title').textContent=TITLES[state.view];
    const fn={budget:renderBudget,cashflow:renderCashFlow,tax:renderTax,savings:renderSavings,networth:renderNetWorth,mom:renderMom,properties:renderProperties}[state.view];
    $('#content').innerHTML=fn();
    document.querySelectorAll('[data-property]').forEach(btn=>btn.addEventListener('click',()=>{state.property=btn.dataset.property;render()}));
    document.querySelectorAll('[data-mom-month]').forEach(btn=>btn.addEventListener('click',()=>{if(btn.dataset.momMonth){state.momMonth=btn.dataset.momMonth;render()}}));
  }

  document.querySelectorAll('.nav-btn').forEach(btn=>btn.addEventListener('click',()=>{
    document.querySelectorAll('.nav-btn').forEach(x=>x.classList.toggle('active',x===btn));state.view=btn.dataset.view;$('#page-title').textContent=TITLES[state.view];loadView();window.scrollTo({top:0,behavior:'smooth'});
  }));
  $('#refresh').addEventListener('click',()=>loadView(true));
  $('#lock').addEventListener('click',lockApp);
  $('#login-form').addEventListener('submit',async e=>{e.preventDefault();const button=$('#login-button');button.disabled=true;button.textContent='Signing in…';$('#login-error').textContent='';try{await signIn($('#password').value);$('#password').value='';showApp();await loadView(true)}catch(err){$('#login-error').textContent=err.message}finally{button.disabled=false;button.textContent='Open dashboard'}});
  document.addEventListener('visibilitychange',()=>{if(!document.hidden&&state.lastSync&&Date.now()-state.lastSync.getTime()>60000)loadView(true)});
  window.addEventListener('online',()=>loadView(true));
  if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').then(reg=>reg.update()).catch(()=>{});
  (async()=>{try{await api({action:'verify_session'});showApp();loadView()}catch{showLogin()}})();
  </script>
