name = "rentals-api"
main = "src/worker.js"
compatibility_date = "2024-01-01"

# KV Namespace bindings
[[kv_namespaces]]
binding = "RENTALS"
id = "75372b2a892343c8b45e3d8abafcbce3"

# Per-IP rate limiting for the public Mom Budget phone endpoint
# (get_mom_budget_public_summary). 60 requests / 60s per IP, counted in-memory
# at the edge — no KV writes. The handler fails open if this binding is absent.
[[ratelimits]]
name = "PUBLIC_RATELIMIT"
namespace_id = "1001"
simple = { limit = 60, period = 60 }

# Layered login protection: a fast per-location burst guard supplements the
# longer 5-failure/15-minute lockout stored in KV.
[[ratelimits]]
name = "AUTH_RATELIMIT"
namespace_id = "1002"
simple = { limit = 10, period = 60 }

# Protect Plaid's paid real-time Balance endpoint from parallel/repeated refreshes.
[[ratelimits]]
name = "PLAID_RATELIMIT"
namespace_id = "1003"
simple = { limit = 4, period = 60 }

# Cloudflare cron is UTC. These two times cover 6:00 AM America/New_York
# year-round; the scheduled handler checks Eastern local time so only the
# correct trigger runs through EST/EDT changes.
[triggers]
crons = ["0 10 * * *", "0 11 * * *"]

# Environment variables (set via: wrangler env.<env>.secret put KEY VALUE)
# wrangler secret put ADMIN_PASSWORD
# Read-only business tax integrations: FMG_TAX_READ_TOKEN, ESAI_TAX_READ_TOKEN
